<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  .thumb {
    position: relative;
    width: 360px;
    height: 360px;
    overflow: hidden;
    margin: 0;
    background: linear-gradient(180deg, #f9f6f1 0%, #f4f0e8 100%);
  }
</style>
</head>
<body>
<div class="thumb">
  <svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- soft lit column where beam crosses each lane -->
      <linearGradient id="beamGlow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#c25450" stop-opacity="0"/>
        <stop offset="40%" stop-color="#dc7f5b" stop-opacity="0.42"/>
        <stop offset="50%" stop-color="#dc7f5b" stop-opacity="0.7"/>
        <stop offset="60%" stop-color="#dc7f5b" stop-opacity="0.42"/>
        <stop offset="100%" stop-color="#c25450" stop-opacity="0"/>
      </linearGradient>
      <!-- hot core of the beam -->
      <linearGradient id="beamCore" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#9c3f3c"/>
        <stop offset="38%" stop-color="#c25450"/>
        <stop offset="50%" stop-color="#dc7f5b"/>
        <stop offset="62%" stop-color="#c25450"/>
        <stop offset="100%" stop-color="#9c3f3c"/>
      </linearGradient>
      <!-- milky frosted glass tile body -->
      <linearGradient id="tileBody" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e6d2c6"/>
        <stop offset="100%" stop-color="#dcc1b3"/>
      </linearGradient>
      <radialGradient id="vign" cx="0.5" cy="0.5" r="0.72">
        <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#3a3530" stop-opacity="0.10"/>
      </radialGradient>
      <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="7"/>
      </filter>
    </defs>

    <!-- ============ TOP LANE: film frames (wide 16:9 rectangles) ============ -->
    <g>
      <!-- lit column behind top lane -->
      <rect x="120" y="44" width="120" height="116" fill="url(#beamGlow)"/>
      <!-- frames -->
      <g stroke="#d6cfc0" stroke-width="2">
        <rect x="22"  y="64" width="68" height="40" rx="4" fill="url(#tileBody)"/>
        <rect x="100" y="64" width="68" height="40" rx="4" fill="url(#tileBody)"/>
        <rect x="178" y="64" width="68" height="40" rx="4" fill="#e9d9cf"/>
        <rect x="256" y="64" width="68" height="40" rx="4" fill="url(#tileBody)"/>
        <rect x="334" y="64" width="68" height="40" rx="4" fill="url(#tileBody)"/>
      </g>
    </g>

    <!-- ============ CENTER RAIL: half-filled timeline + chapter dots ============ -->
    <g>
      <!-- unfilled (right) warm hairline -->
      <rect x="180" y="176" width="158" height="7" rx="3.5" fill="#d6cfc0"/>
      <!-- filled (left) terracotta -->
      <rect x="22" y="176" width="158" height="7" rx="3.5" fill="#c25450"/>
      <!-- chapter dots: lit on left, faint on right -->
      <circle cx="58"  cy="179.5" r="6" fill="#c25450" stroke="#fbf9f4" stroke-width="2"/>
      <circle cx="118" cy="179.5" r="6" fill="#c25450" stroke="#fbf9f4" stroke-width="2"/>
      <circle cx="240" cy="179.5" r="6" fill="#a8a299" stroke="#fbf9f4" stroke-width="2"/>
      <circle cx="304" cy="179.5" r="6" fill="#a8a299" stroke="#fbf9f4" stroke-width="2"/>
    </g>

    <!-- ============ BOTTOM LANE: UI cards (header bar + 2 body lines) ============ -->
    <g>
      <rect x="120" y="200" width="120" height="116" fill="url(#beamGlow)"/>
      <g>
        <!-- card 1 -->
        <rect x="22"  y="256" width="68" height="48" rx="5" fill="url(#tileBody)" stroke="#d6cfc0" stroke-width="2"/>
        <rect x="30"  y="263" width="36" height="6" rx="3" fill="#9c3f3c" opacity="0.55"/>
        <rect x="30"  y="278" width="52" height="4" rx="2" fill="#b9a394"/>
        <rect x="30"  y="288" width="40" height="4" rx="2" fill="#b9a394"/>
        <!-- card 2 -->
        <rect x="100" y="256" width="68" height="48" rx="5" fill="url(#tileBody)" stroke="#d6cfc0" stroke-width="2"/>
        <rect x="108" y="263" width="36" height="6" rx="3" fill="#9c3f3c" opacity="0.55"/>
        <rect x="108" y="278" width="52" height="4" rx="2" fill="#b9a394"/>
        <rect x="108" y="288" width="40" height="4" rx="2" fill="#b9a394"/>
        <!-- card 3 (under beam, brighter) -->
        <rect x="178" y="256" width="68" height="48" rx="5" fill="#e9d9cf" stroke="#d6cfc0" stroke-width="2"/>
        <rect x="186" y="263" width="36" height="6" rx="3" fill="#9c3f3c" opacity="0.7"/>
        <rect x="186" y="278" width="52" height="4" rx="2" fill="#b9a394"/>
        <rect x="186" y="288" width="40" height="4" rx="2" fill="#b9a394"/>
        <!-- card 4 -->
        <rect x="256" y="256" width="68" height="48" rx="5" fill="url(#tileBody)" stroke="#d6cfc0" stroke-width="2"/>
        <rect x="264" y="263" width="36" height="6" rx="3" fill="#9c3f3c" opacity="0.55"/>
        <rect x="264" y="278" width="52" height="4" rx="2" fill="#b9a394"/>
        <rect x="264" y="288" width="40" height="4" rx="2" fill="#b9a394"/>
        <!-- card 5 -->
        <rect x="334" y="256" width="68" height="48" rx="5" fill="url(#tileBody)" stroke="#d6cfc0" stroke-width="2"/>
        <rect x="342" y="263" width="36" height="6" rx="3" fill="#9c3f3c" opacity="0.55"/>
        <rect x="342" y="278" width="52" height="4" rx="2" fill="#b9a394"/>
        <rect x="342" y="288" width="40" height="4" rx="2" fill="#b9a394"/>
      </g>
    </g>

    <!-- ============ FALLING TERRACOTTA DOTS in the gap (video → web) ============ -->
    <g>
      <circle cx="171" cy="120" r="2.6" fill="#c25450" opacity="0.55"/>
      <circle cx="189" cy="134" r="3.2" fill="#c25450" opacity="0.72"/>
      <circle cx="178" cy="150" r="3.6" fill="#c25450" opacity="0.9"/>
      <circle cx="194" cy="158" r="2.8" fill="#dc7f5b" opacity="0.85"/>
      <circle cx="182" cy="200" r="3.4" fill="#c25450" opacity="0.9"/>
      <circle cx="169" cy="214" r="2.6" fill="#9c3f3c" opacity="0.8"/>
      <circle cx="192" cy="228" r="3.0" fill="#9c3f3c" opacity="0.85"/>
      <circle cx="180" cy="244" r="2.4" fill="#9c3f3c" opacity="0.7"/>
    </g>

    <!-- ============ THE PLAYHEAD BEAM (dominant vertical bar) ============ -->
    <g>
      <!-- wide soft glow -->
      <rect x="164" y="28" width="32" height="304" fill="#dc7f5b" opacity="0.26" filter="url(#soft)"/>
      <!-- core bar top-to-bottom -->
      <rect x="175" y="28" width="10" height="304" rx="5" fill="url(#beamCore)"/>
      <!-- bright top cap -->
      <circle cx="180" cy="28" r="7" fill="#dc7f5b"/>
      <circle cx="180" cy="28" r="3.2" fill="#ffe8c8"/>
    </g>

    <rect x="0" y="0" width="360" height="360" fill="url(#vign)"/>
  </svg>
</div>
</body>
</html>
