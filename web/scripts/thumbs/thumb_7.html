<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .thumb {
    position: relative;
    width: 360px;
    height: 360px;
    overflow: hidden;
    margin: 0;
    background: radial-gradient(circle at 50% 46%, #fbf9f4 0%, #f7f4ee 52%, #efe8de 100%);
  }
  .thumb svg { position: absolute; inset: 0; display: block; }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 46%, rgba(0,0,0,0) 50%, rgba(120,95,80,0.08) 100%);
  }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.045; mix-blend-mode: multiply; }
</style>
</head>
<body>
  <div class="thumb">
    <svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="probeGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#e8a39d" stop-opacity="0.95" />
          <stop offset="22%" stop-color="#c25450" stop-opacity="0.55" />
          <stop offset="55%" stop-color="#c25450" stop-opacity="0.20" />
          <stop offset="100%" stop-color="#c25450" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="core" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#fff6f3" stop-opacity="1" />
          <stop offset="38%" stop-color="#e08e88" stop-opacity="1" />
          <stop offset="100%" stop-color="#c25450" stop-opacity="1" />
        </radialGradient>
        <radialGradient id="nodeHalo" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#c25450" stop-opacity="0.42" />
          <stop offset="100%" stop-color="#c25450" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#e0908a" stop-opacity="0.98" />
          <stop offset="40%" stop-color="#9c3f3c" stop-opacity="0.82" />
          <stop offset="100%" stop-color="#9c3f3c" stop-opacity="0.30" />
        </linearGradient>
      </defs>

      <!-- ===== embedding-space corpus: a field of document dots, denser to centre ===== -->
      <g fill="#b3a499">
        <circle cx="46"  cy="86"  r="3.4" opacity="0.55"/>
        <circle cx="84"  cy="50"  r="2.8" opacity="0.5"/>
        <circle cx="150" cy="44"  r="3.0" opacity="0.5"/>
        <circle cx="214" cy="40"  r="2.6" opacity="0.5"/>
        <circle cx="286" cy="58"  r="3.2" opacity="0.55"/>
        <circle cx="322" cy="104" r="2.8" opacity="0.5"/>
        <circle cx="338" cy="170" r="3.0" opacity="0.5"/>
        <circle cx="330" cy="244" r="2.8" opacity="0.5"/>
        <circle cx="300" cy="306" r="3.2" opacity="0.55"/>
        <circle cx="232" cy="330" r="2.8" opacity="0.5"/>
        <circle cx="150" cy="324" r="3.0" opacity="0.5"/>
        <circle cx="78"  cy="306" r="3.0" opacity="0.52"/>
        <circle cx="34"  cy="244" r="2.8" opacity="0.5"/>
        <circle cx="26"  cy="166" r="3.0" opacity="0.5"/>
        <!-- mid ring -->
        <circle cx="110" cy="120" r="3.6" opacity="0.66"/>
        <circle cx="252" cy="104" r="3.4" opacity="0.64"/>
        <circle cx="292" cy="186" r="3.2" opacity="0.6"/>
        <circle cx="270" cy="276" r="3.4" opacity="0.62"/>
        <circle cx="150" cy="298" r="3.2" opacity="0.6"/>
        <circle cx="90"  cy="232" r="3.4" opacity="0.62"/>
        <circle cx="74"  cy="160" r="3.2" opacity="0.6"/>
        <circle cx="196" cy="86"  r="3.0" opacity="0.58"/>
        <!-- inner scatter -->
        <circle cx="150" cy="150" r="3.0" opacity="0.66"/>
        <circle cx="226" cy="142" r="2.8" opacity="0.64"/>
        <circle cx="170" cy="232" r="3.0" opacity="0.64"/>
        <circle cx="238" cy="222" r="2.6" opacity="0.6"/>
        <circle cx="128" cy="206" r="2.6" opacity="0.6"/>
      </g>
      <!-- a few warm-terracotta corpus dots (relevant-but-unlit neighbours) -->
      <g fill="#cf8b87">
        <circle cx="118" cy="176" r="3.0" opacity="0.6"/>
        <circle cx="232" cy="186" r="2.8" opacity="0.58"/>
        <circle cx="190" cy="260" r="2.8" opacity="0.55"/>
      </g>

      <!-- ===== k-NN beams: probe (180,180) → 6 nearest neighbours ===== -->
      <g stroke-linecap="round" fill="none">
        <line x1="180" y1="180" x2="252" y2="120" stroke="url(#beam)" stroke-width="3.4"/>
        <line x1="180" y1="180" x2="266" y2="190" stroke="url(#beam)" stroke-width="3.0"/>
        <line x1="180" y1="180" x2="224" y2="256" stroke="url(#beam)" stroke-width="3.0"/>
        <line x1="180" y1="180" x2="138" y2="240" stroke="url(#beam)" stroke-width="2.8"/>
        <line x1="180" y1="180" x2="106" y2="166" stroke="url(#beam)" stroke-width="3.0"/>
        <line x1="180" y1="180" x2="146" y2="104" stroke="url(#beam)" stroke-width="2.8"/>
      </g>

      <!-- ===== lit neighbour nodes (crisp terracotta + halo) ===== -->
      <g>
        <circle cx="252" cy="120" r="13" fill="url(#nodeHalo)"/>
        <circle cx="266" cy="190" r="12" fill="url(#nodeHalo)"/>
        <circle cx="224" cy="256" r="12" fill="url(#nodeHalo)"/>
        <circle cx="138" cy="240" r="12" fill="url(#nodeHalo)"/>
        <circle cx="106" cy="166" r="12" fill="url(#nodeHalo)"/>
        <circle cx="146" cy="104" r="11" fill="url(#nodeHalo)"/>

        <circle cx="252" cy="120" r="6.6" fill="#c25450"/>
        <circle cx="266" cy="190" r="6.0" fill="#c25450"/>
        <circle cx="224" cy="256" r="6.0" fill="#c25450"/>
        <circle cx="138" cy="240" r="6.0" fill="#c25450"/>
        <circle cx="106" cy="166" r="6.0" fill="#c25450"/>
        <circle cx="146" cy="104" r="5.6" fill="#c25450"/>

        <circle cx="252" cy="120" r="2.2" fill="#fbe4df"/>
        <circle cx="266" cy="190" r="2.0" fill="#fbe4df"/>
        <circle cx="224" cy="256" r="2.0" fill="#fbe4df"/>
        <circle cx="138" cy="240" r="2.0" fill="#fbe4df"/>
        <circle cx="106" cy="166" r="2.0" fill="#fbe4df"/>
        <circle cx="146" cy="104" r="1.8" fill="#fbe4df"/>
      </g>

      <!-- the answer node (top-right) crystallises: a thin ring + lock arrow -->
      <circle cx="252" cy="120" r="13" fill="none" stroke="#9c3f3c" stroke-width="1.6" opacity="0.85"/>
      <g transform="translate(252,120) rotate(-40)">
        <path d="M -22 0 L -9 0 M -13 -4.5 L -9 0 L -13 4.5"
              stroke="#9c3f3c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- ===== query probe: halo + hot crystallised core ===== -->
      <circle cx="180" cy="180" r="58" fill="url(#probeGlow)"/>
      <circle cx="180" cy="180" r="15" fill="url(#core)"/>
      <circle cx="180" cy="180" r="6" fill="#fff6f3"/>
    </svg>

    <div class="vignette"></div>
    <svg class="grain" width="360" height="360">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#g)"/>
    </svg>
  </div>
</body>
</html>
