<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  .thumb{
    position:relative;
    width:360px;height:360px;
    margin:0;overflow:hidden;
    background:linear-gradient(160deg,#f7f4ee 0%,#f1ede4 100%);
    font-family:"Geist",system-ui,sans-serif;
  }
  /* soft inner vignette on brand */
  .vignette{
    position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 90px 10px rgba(58,53,48,0.05);
  }
</style>
</head>
<body>
<div class="thumb">
  <svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="pageFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fdfbf6"/>
        <stop offset="1" stop-color="#fbf9f4"/>
      </linearGradient>
      <linearGradient id="triGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#cc5a56"/>
        <stop offset="1" stop-color="#c25450"/>
      </linearGradient>
      <radialGradient id="padShine" cx="0.42" cy="0.36" r="0.75">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="0.55" stop-color="#fdfbf7"/>
        <stop offset="1" stop-color="#f6f2ea"/>
      </radialGradient>
      <filter id="padShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#3a3530" flood-opacity="0.20"/>
      </filter>
      <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3a3530" flood-opacity="0.12"/>
      </filter>
      <filter id="curShadow" x="-60%" y="-60%" width="220%" height="220%">
        <feDropShadow dx="1" dy="2" stdDeviation="2.2" flood-color="#3a3530" flood-opacity="0.30"/>
      </filter>
    </defs>

    <!-- ===== Browser window: ~80% width, bleeds past bottom ===== -->
    <g filter="url(#winShadow)">
      <rect x="40" y="44" width="280" height="340" rx="20" ry="20"
            fill="url(#pageFill)" stroke="#d6cfc0" stroke-width="1.5"/>
    </g>

    <!-- chrome bar -->
    <path d="M41.5 64 a18.5 18.5 0 0 1 18.5 -18.5 h240 a18.5 18.5 0 0 1 18.5 18.5 v22 h-277 z"
          fill="#f1ede4"/>
    <line x1="41.5" y1="86" x2="318.5" y2="86" stroke="#e6e1d7" stroke-width="1.5"/>

    <!-- traffic-light dots -->
    <circle cx="64" cy="65.5" r="5" fill="#c25450"/>
    <circle cx="83" cy="65.5" r="5" fill="#e6e1d7"/>
    <circle cx="102" cy="65.5" r="5" fill="#e6e1d7"/>

    <!-- recessed empty address pill -->
    <rect x="132" y="58" width="158" height="15" rx="7.5" ry="7.5"
          fill="#faf7f1" stroke="#d6cfc0" stroke-width="1.2"/>

    <!-- ===== Live / watch-this rings ===== -->
    <circle cx="180" cy="208" r="92" fill="none" stroke="#e6e1d7" stroke-width="1.5" opacity="0.7"/>
    <circle cx="180" cy="208" r="80" fill="none" stroke="#e6e1d7" stroke-width="2"/>

    <!-- ===== Central play pad ===== -->
    <g filter="url(#padShadow)">
      <circle cx="180" cy="208" r="70" fill="url(#padShine)" stroke="#e6e1d7" stroke-width="1.5"/>
    </g>

    <!-- play triangle, optically nudged right -->
    <path d="M158 168 L158 248 L226 208 Z"
          fill="url(#triGrad)" stroke="#9c3f3c" stroke-width="2"
          stroke-linejoin="round"/>

    <!-- ===== Cursor arrow at lower-right of pad ===== -->
    <g filter="url(#curShadow)" transform="translate(224,250) rotate(8)">
      <path d="M0 0 L0 27 L7 20.5 L12 31 L17 28.5 L12.5 18.5 L21 18 Z"
            fill="#9c3f3c" stroke="#fbf9f4" stroke-width="1.6" stroke-linejoin="round"/>
    </g>

    <!-- ===== Faint bottom progress-dot strip ===== -->
    <g opacity="0.9">
      <circle cx="138" cy="332" r="3.4" fill="#e6e1d7"/>
      <circle cx="152" cy="332" r="3.4" fill="#e6e1d7"/>
      <circle cx="166" cy="332" r="3.4" fill="#e6e1d7"/>
      <circle cx="180" cy="332" r="3.6" fill="#c25450"/>
      <circle cx="194" cy="332" r="3.4" fill="#e6e1d7"/>
      <circle cx="208" cy="332" r="3.4" fill="#e6e1d7"/>
      <circle cx="222" cy="332" r="3.4" fill="#e6e1d7"/>
    </g>
  </svg>
  <div class="vignette"></div>
</div>
</body>
</html>
